<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOS AI Assistant</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D1B2A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOS AI">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Styles -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Overlay (Mobile) -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="layout">

    <!-- Sidebar -->
    <div id="sb">
      <div class="brand">
        <div class="brand-title">NOS AI</div>
        <div class="brand-sub">المساعد الذكي — نيشونز أوف سكاي</div>
        <div class="brand-stat">
          <span style="color:#3A5A7A;font-size:11px">المستندات</span>
          <span id="kb-count" style="color:#C8A86B;font-size:12px;font-weight:700">0</span>
        </div>
      </div>

      <div class="sb-nav">
        <button class="nb on" id="nav-chat"      onclick="gv('chat')">💬 المحادثة</button>
        <button class="nb"    id="nav-manage"    onclick="gv('manage')">📚 قاعدة المعرفة</button>
        <button class="nb"    id="nav-analytics" onclick="gv('analytics')">📊 التحليلات</button>
      </div>

      <div id="sb-list"></div>

      <div class="sb-foot">
        <button class="add-btn" onclick="gv('add',true)">+ إضافة محتوى</button>
        <div class="sb-tools">
          <button class="tool-btn" onclick="exportKb()">📤 تصدير</button>
          <button class="tool-btn" onclick="document.getElementById('imp-file').click()">📥 استيراد</button>
          <button class="icon-btn" id="dark-btn" onclick="toggleDark()" title="وضع ليلي">🌙</button>
          <button class="icon-btn" onclick="resetSetup()" title="إعادة الإعداد">⚙️</button>
        </div>
      </div>
      <input id="imp-file" type="file" accept=".json" style="display:none" onchange="importKb(this)">
    </div>

    <!-- Main -->
    <div id="main"></div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
