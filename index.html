<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOS AI Assistant</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D1B2A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOS AI">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden;background:#F4F6F9;color:#1A2332}
button{cursor:pointer;font-family:inherit}
textarea,input{font-family:inherit}
a{color:#C8A86B}

/* Setup Screen */
#setup{display:none;align-items:center;justify-content:center;height:100vh;background:#0D1B2A}
.sbox{background:#1A2D40;border-radius:14px;padding:34px;max-width:440px;width:90%}
.stitle{color:#C8A86B;font-size:22px;font-weight:700;margin-bottom:4px;direction:rtl}
.ssub{color:#4A6B8A;font-size:13px;margin-bottom:24px;line-height:1.7;direction:rtl}
.slabel{display:block;color:#7A9BB0;font-size:12px;font-weight:600;margin-bottom:5px;direction:rtl}
.sinput{width:100%;padding:11px 14px;background:#0D1B2A;border:1px solid #2A4060;border-radius:8px;color:#E0E8F0;font-size:13px;outline:none;margin-bottom:8px}
.sinput:focus{border-color:#C8A86B}
.sinfo{font-size:11px;color:#4A6B8A;line-height:1.7;margin-bottom:16px;direction:rtl}
.sbtn-main{width:100%;padding:13px;background:#C8A86B;border:none;border-radius:9px;color:#0D1B2A;font-weight:700;font-size:14px}
.sbtn-main:hover{background:#D4B478}

/* App Layout */
#app{height:100vh;overflow:hidden}
.layout{display:flex;height:100%;direction:rtl}

/* Sidebar */
#sb{width:245px;background:#0D1B2A;display:flex;flex-direction:column;border-left:1px solid #1A2D40;flex-shrink:0}
.brand{padding:17px 14px 13px;border-bottom:1px solid #1A2D40}
.brand-title{color:#C8A86B;font-weight:700;font-size:16px}
.brand-sub{color:#3A5A7A;font-size:11px;margin-top:2px}
.brand-stat{margin-top:9px;background:#1A2D40;border-radius:6px;padding:5px 10px;display:flex;justify-content:space-between}
.sb-nav{padding:8px}
.nb{width:100%;padding:9px 12px;background:transparent;border:none;border-radius:7px;color:#5A7A9A;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:2px;text-align:right;direction:rtl}
.nb:hover{background:#1A2D40;color:#8AAAC0}
.nb.on{background:#1A2D40;color:#C8A86B;font-weight:600}
#sb-list{flex:1;overflow-y:auto;padding:0 8px}
.sb-item{padding:7px 9px;background:#1A2D40;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:background .1s}
.sb-item:hover{background:#243D52}
.sb-foot{padding:10px 8px;border-top:1px solid #1A2D40;display:flex;flex-direction:column;gap:5px}
.add-btn{width:100%;padding:10px;background:#C8A86B;border:none;border-radius:7px;color:#0D1B2A;font-weight:700;font-size:13px}
.add-btn:hover{background:#D4B478}
.sb-tools{display:flex;gap:5px}
.tool-btn{flex:1;padding:6px 4px;background:#1A2D40;border:none;border-radius:6px;color:#7A9BB0;font-size:11px}
.tool-btn:hover{background:#243D52;color:#C8A86B}
.icon-btn{padding:6px 8px;background:#1A2D40;border:none;border-radius:6px;color:#4A6B8A;font-size:11px}
.icon-btn:hover{background:#243D52}

/* Main Area */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mh{padding:12px 20px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mh-title{font-weight:600;font-size:14px;direction:rtl}
.mh-sub{font-size:11px;color:#9CA3AF;direction:rtl}
.ibtn{padding:5px 12px;background:transparent;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;color:#9CA3AF}
.ibtn:hover{background:#F3F4F6}
.pri-btn{padding:10px 20px;background:#0D1B2A;border:none;border-radius:8px;color:#C8A86B;font-weight:700;font-size:13px}
.pri-btn:hover{background:#1A2D40}
.sec-btn{padding:10px 16px;background:#F3F4F6;border:none;border-radius:8px;color:#374151;font-size:13px}
.sec-btn:hover{background:#E5E7EB}

/* Chat */
#cmsg{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column}
.bubble-u{max-width:70%;padding:10px 14px;font-size:13px;line-height:1.7;border-radius:12px 4px 12px 12px;background:#0D1B2A;color:#E8F0F8;direction:rtl;white-space:pre-wrap}
.bubble-a{max-width:70%;padding:10px 14px;font-size:13px;line-height:1.7;border-radius:4px 12px 12px 12px;background:#fff;color:#1A2332;direction:rtl;border:1px solid #E5E7EB}
.avi-u{width:26px;height:26px;background:#C8A86B;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.avi-a{width:26px;height:26px;background:#0D1B2A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg-row{display:flex;align-items:flex-end;gap:7px;margin-bottom:10px}
.cinput-area{padding:14px 20px;background:#fff;border-top:1px solid #E5E7EB;flex-shrink:0}
#chat-inp{width:100%;padding:10px 14px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;resize:none;outline:none;direction:rtl;line-height:1.6;background:#fff}
#chat-inp:focus{border-color:#C8A86B}
.send-btn{padding:10px 18px;background:#0D1B2A;border:none;border-radius:8px;color:#C8A86B;font-weight:700;font-size:13px;flex-shrink:0}
.send-btn:hover{background:#1A2D40}
.send-btn:disabled{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed}

/* KB Manage */
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.kcard{background:#fff;border-radius:10px;padding:14px;border:1px solid #E5E7EB;direction:rtl}
.kcard:hover{border-color:#D1D5DB}
.cbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.del-btn{padding:2px 8px;font-size:11px;background:#FEF2F2;border:none;border-radius:4px;color:#DC2626}
.edit-btn{padding:2px 8px;font-size:11px;background:#F3F4F6;border:none;border-radius:4px}

/* Form */
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;direction:rtl}
.form-inp{width:100%;padding:9px 12px;border:1px solid #E5E7EB;border-radius:7px;font-size:13.5px;outline:none;direction:rtl}
.form-inp:focus{border-color:#C8A86B}
.cat-btn{padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;border:2px solid #E5E7EB;background:#fff;color:#9CA3AF;cursor:pointer}
.cat-btn.on{color:var(--cc);background:var(--cb);border-color:var(--cc)}
.hint-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400E;line-height:1.7;direction:rtl}
.err-box{padding:9px 13px;background:#FEF2F2;border-radius:7px;color:#DC2626;font-size:13px;direction:rtl}
.ok-box{padding:9px 13px;background:#ECFDF5;border-radius:7px;color:#059669;font-size:13px;direction:rtl;font-weight:600}

/* Scrollbars */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2A4060;border-radius:3px}
#cmsg::-webkit-scrollbar-thumb{background:#D1D5DB}

/* Markdown in AI responses */
.bubble-a strong{font-weight:700;color:#0D1B2A}
.bubble-a code{background:#F3F4F6;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px}
.bubble-a ul{list-style:disc;padding-right:18px;margin:4px 0}
.bubble-a li{margin-bottom:2px}
.bubble-a .md-h{font-weight:700;display:block;margin:7px 0 2px;color:#1A2332}

/* Typing indicator */
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#9CA3AF;margin:0 2px;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

/* Hamburger button — مخفي على desktop */
.menu-btn{display:none;align-items:center;justify-content:center;width:34px;height:34px;
  background:#F3F4F6;border:none;border-radius:7px;font-size:18px;color:#374151;flex-shrink:0}
.menu-btn:hover{background:#E5E7EB}

/* Overlay للموبايل */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99}
.overlay.on{display:block}

/* Mobile */
@media(max-width:768px){
  #sb{
    position:fixed !important;
    right:-280px !important;
    top:0;
    height:100%;
    width:270px;
    z-index:100;
    transition:right .28s ease;
    box-shadow:-4px 0 24px rgba(0,0,0,.35);
  }
  #sb.open{right:0 !important}
  .menu-btn{display:flex}
  .bubble-u,.bubble-a{max-width:88%}
  .mh{padding:10px 14px}
  #cmsg{padding:12px 14px}
  .cinput-area{padding:10px 14px}
  #chat-inp{font-size:16px}
}</style>
</head>
<body>


<!-- Overlay للموبايل -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">
  <div class="layout">

    <!-- Sidebar -->
    <div id="sb">
      <div class="brand">
        <div class="brand-title">NOS AI</div>
        <div class="brand-sub">المساعد الذكي — نيشونز أوف سكاي</div>
        <div class="brand-stat">
          <span style="color:#3A5A7A;font-size:11px">المستندات</span>
          <span id="kb-count" style="color:#C8A86B;font-size:12px;font-weight:700">0</span>
        </div>
      </div>

      <div class="sb-nav">
        <button class="nb on" id="nav-chat" onclick="gv('chat')">💬 المحادثة</button>
        <button class="nb" id="nav-manage" onclick="gv('manage')">📚 قاعدة المعرفة</button>
      </div>

      <div id="sb-list"></div>

      <div class="sb-foot">
        <button class="add-btn" onclick="gv('add',true)">+ إضافة محتوى</button>
        <div class="sb-tools">
          <button class="tool-btn" onclick="exportKb()" title="تصدير قاعدة المعرفة كـ JSON">📤 تصدير</button>
          <button class="tool-btn" onclick="document.getElementById('imp-file').click()" title="استيراد JSON">📥 استيراد</button>
          <button class="icon-btn" onclick="resetSetup()" title="إعادة الإعداد">⚙️</button>
        </div>
      </div>
      <input id="imp-file" type="file" accept=".json" style="display:none" onchange="importKb(this)">
    </div>

    <!-- Main -->
    <div id="main"></div>
  </div>
</div>

<script>
/* ── Constants ── */
const DARK='#0D1B2A', GOLD='#C8A86B';
const CATS=[
  {id:'policy',  ar:'سياسات',     col:'#1D4ED8', bg:'#EFF6FF'},
  {id:'form',    ar:'نماذج',       col:'#7C3AED', bg:'#F5F3FF'},
  {id:'procedure',ar:'إجراءات',   col:'#065F46', bg:'#ECFDF5'},
  {id:'legal',   ar:'قانوني',      col:'#B91C1C', bg:'#FEF2F2'},
  {id:'hr',      ar:'موارد بشرية',col:'#B45309', bg:'#FFFBEB'},
  {id:'general', ar:'عام',         col:'#374151', bg:'#F9FAFB'},
];
const gc = id => CATS.find(c=>c.id===id) || CATS[5];
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── Markdown renderer (للردود فقط) ── */
function md(text){
  let s = esc(text);
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`(.*?)`/g, '<code>$1</code>');
  s = s.replace(/^### (.+)$/gm, '<span class="md-h" style="font-size:13px;">$1</span>');
  s = s.replace(/^## (.+)$/gm,  '<span class="md-h" style="font-size:14px;">$1</span>');
  s = s.replace(/^- (.+)$/gm,   '<li>$1</li>');
  s = s.replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g, '<ul>$&</ul>');
  s = s.replace(/\n/g,'<br>');
  return s;
}

/* ── Supabase Config ── */
const SUPA_URL = 'https://xzxdaupwwwdcwfnqweub.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6eGRhdXB3d3dkY3dmbnF3ZXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTM5NTAsImV4cCI6MjA5MDg4OTk1MH0.KjNZpFvLxh8XfDDoWdpVsIQZAh1PjzGXOrfDmApZ4K8';
const SUPA_H   = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
const SUPA_TB  = `${SUPA_URL}/rest/v1/nos_knowledge_base`;

/* ── Supabase Helpers ── */
async function sbLoad(){
  const r = await fetch(`${SUPA_TB}?select=*&order=created_at.asc`, {headers:SUPA_H});
  return r.ok ? await r.json() : null;
}
async function sbUpsert(item){
  return fetch(SUPA_TB, {
    method:'POST',
    headers:{...SUPA_H,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body: JSON.stringify(item)
  });
}
async function sbDelete(id){
  return fetch(`${SUPA_TB}?id=eq.${id}`, {method:'DELETE', headers:SUPA_H});
}

/* ── State ── */
const DEFAULT_WORKER = 'https://helper.soloever2.workers.dev';
let KB=[], MSGS=[], VIEW='chat', EDIT=null, DELID=null, BUSY=false, WORKER_URL='', SEARCH='';
let FORM={title:'',category:'general',content:''};

/* ── Init ── */
function init(){
  WORKER_URL = localStorage.getItem('nos-worker-url') || DEFAULT_WORKER;
  KB   = JSON.parse(localStorage.getItem('nos-kb')   || '[]');
  MSGS = JSON.parse(localStorage.getItem('nos-chat') || '[]');
  re();
  loadRemoteKB(); /* جيب الـ KB من GitHub في الخلفية */
}

/* ── Sync KB من Supabase ── */
async function loadRemoteKB(){
  try {
    const data = await sbLoad();
    if(!data || !data.length) return;
    KB = data;
    localStorage.setItem('nos-kb', JSON.stringify(KB));
    re();
  } catch(e){/* offline — يكمل بالكاش المحلي */}
}

function saveSetup(){
  const url = document.getElementById('su-url').value.trim();
  if(!url){ alert('أدخل رابط الـ Worker أولاً'); return; }
  localStorage.setItem('nos-worker-url', url);
  WORKER_URL = url;
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  re();
}

function resetSetup(){
  if(!confirm('إعادة إعداد رابط الـ Worker؟')) return;
  localStorage.removeItem('nos-worker-url');
  location.reload();
}

/* ── Persist ── */
function saveKb()  { localStorage.setItem('nos-kb',   JSON.stringify(KB)); }
function saveMsgs(){ localStorage.setItem('nos-chat', JSON.stringify(MSGS.slice(-40))); }

/* ── Export / Import ── */
function exportKb(){
  const blob = new Blob([JSON.stringify(KB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nos-knowledge-base.json';
  a.click();
}
async function importKb(inp){
  const file = inp.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error('ملف غير صالح');
      const now = new Date().toISOString();
      const valid = data
        .filter(d => d.title && d.content)
        .map(d => ({
          id:         d.id || ('k'+Date.now()+Math.random().toString(36).slice(2)),
          title:      d.title,
          category:   d.category || 'general',
          content:    d.content,
          created_at: d.createdAt || d.created_at || now,
          updated_at: d.updatedAt || d.updated_at || now
        }));
      if(!valid.length) throw new Error('لا يوجد مستندات صالحة');

      /* رفع batch لـ Supabase */
      const res = await fetch(SUPA_TB, {
        method:'POST',
        headers:{...SUPA_H,'Prefer':'resolution=merge-duplicates,return=minimal'},
        body: JSON.stringify(valid)
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(`Supabase: ${err.message || res.status}`);
      }

      KB = [...KB.filter(k => !valid.find(v=>v.id===k.id)), ...valid];
      localStorage.setItem('nos-kb', JSON.stringify(KB));
      re();
      alert(`✅ تم استيراد ${valid.length} مستند ورفعهم على Supabase`);
    } catch(err) { alert('❌ خطأ: ' + err.message); }
  };
  reader.readAsText(file);
  inp.value = '';
}

/* ══ RENDER ══ */
function re(){
  document.getElementById('kb-count').textContent = KB.length;

  /* Update nav buttons */
  ['chat','manage'].forEach(v => {
    const b = document.getElementById('nav-'+v);
    if(b){ const on = VIEW===v || (VIEW==='add'&&v==='manage'); b.className='nb'+(on?' on':''); }
  });

  /* Sidebar list */
  const sl = document.getElementById('sb-list');
  if(sl){
    if(VIEW==='chat' && KB.length){
      sl.innerHTML =
        `<div style="color:#2A4060;font-size:9px;padding:6px 3px 3px;text-transform:uppercase;letter-spacing:1px;">محتوى محمّل</div>` +
        KB.slice(0,10).map(k => {
          const c = gc(k.category);
          return `<div class="sb-item" onclick="openEdit('${k.id}')">
            <div style="color:#B8C8D8;font-size:11px;font-weight:500;text-align:right;margin-bottom:2px;">${esc(k.title)}</div>
            <span style="font-size:9px;padding:1px 5px;border-radius:10px;background:${c.bg};color:${c.col};font-weight:700;">${c.ar}</span>
          </div>`;
        }).join('') +
        (KB.length>10 ? `<div style="color:#2A4060;font-size:9px;text-align:center;padding:4px 0;">+${KB.length-10} مزيد</div>` : '');
    } else {
      sl.innerHTML = VIEW==='chat'
        ? `<div style="text-align:center;padding:20px 8px;color:#2A4060;font-size:11px;line-height:1.8;">فارغة<br>أضف محتوى</div>`
        : '';
    }
  }

  /* Main content */
  const m = document.getElementById('main');
  if(!m) return;
  if(VIEW==='chat')   rChat(m);
  else if(VIEW==='manage') rManage(m);
  else if(VIEW==='add')    rAdd(m);
}

/* ── Chat View ── */
function rChat(el){
  const rows = MSGS.map(m => {
    const u = m.role==='user';
    return `<div class="msg-row" style="justify-content:${u?'flex-start':'flex-end'}">
      ${u ? `<div class="avi-u">👤</div>` : ''}
      <div class="${u?'bubble-u':'bubble-a'}">${u ? esc(m.content) : md(m.content)}</div>
      ${!u ? `<div class="avi-a">🤖</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="mh">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="mh-title">المساعد الذكي</div>
        <div class="mh-sub">${KB.length ? KB.length+' مستند محمّل' : 'لا توجد بيانات — أضف محتوى أولاً'}</div>
      </div>
      ${MSGS.length ? `<button class="ibtn" onclick="clearChat()">مسح المحادثة</button>` : ''}
    </div>
    <div id="cmsg">
      ${!MSGS.length ? `
        <div style="flex:1;display:flex;align-items:center;justify-content:center;min-height:300px;">
          <div style="text-align:center;max-width:340px;direction:rtl;">
            <div style="font-size:44px;margin-bottom:12px;">🤖</div>
            <div style="font-weight:700;font-size:16px;color:#1A2332;margin-bottom:8px;">مرحباً! أنا مساعد NOS</div>
            <div style="font-size:13px;color:#9CA3AF;line-height:1.8;">
              ${KB.length ? `لدي ${KB.length} مستند جاهز. اسألني!` : 'ابدأ بإضافة محتوى من قاعدة المعرفة، ثم ارجع هنا واسألني.'}
            </div>
            ${!KB.length ? `<button class="pri-btn" onclick="gv('manage')" style="margin-top:14px;font-size:13px;">📚 فتح قاعدة المعرفة</button>` : ''}
            ${KB.length ? `
            <div style="margin-top:20px;text-align:right;">
              <div style="font-size:11px;color:#9CA3AF;margin-bottom:10px;text-align:center;">أسئلة شائعة 👇</div>
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${[
                  'ما هي مستندات التنازل المطلوبة؟',
                  'ما هو الـ SLA لكل نوع طلب؟',
                  'ما هي إجراءات إلغاء العقد واسترداد المبالغ؟',
                  'ما هي رسوم إصدار عقد جديد؟',
                  'ما هي إجراءات تغيير الشيكات؟',
                  'كيف يطلب العميل زيارة الموقع؟'
                ].map(q => `
                  <button onclick="sendQuick('${q}')" style="
                    background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;
                    padding:9px 16px;font-size:12.5px;color:#374151;
                    font-family:'Tajawal',sans-serif;cursor:pointer;
                    text-align:right;direction:rtl;
                    transition:all .15s;line-height:1.4;
                  " onmouseover="this.style.borderColor='#C8A86B';this.style.background='#FFFBEB'"
                     onmouseout="this.style.borderColor='#E5E7EB';this.style.background='#fff'"
                  >${q}</button>
                `).join('')}
              </div>
            </div>` : ''}
          </div>
        </div>` : ''}
      ${rows}
      ${BUSY ? `
        <div class="msg-row" style="justify-content:flex-end">
          <div class="avi-a">🤖</div>
          <div class="bubble-a" style="padding:12px 16px;"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        </div>` : ''}
      <div id="cend"></div>
    </div>
    <div class="cinput-area">
      <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:4px;">
        <textarea id="chat-inp" rows="2" placeholder="اكتب سؤالك... (Enter للإرسال، Shift+Enter لسطر جديد)" ${BUSY?'disabled':''}></textarea>
        <button class="send-btn" onclick="doSend()" ${BUSY?'disabled':''}>إرسال ↑</button>
      </div>
      <div style="font-size:10px;color:#D1D5DB;direction:rtl;">${KB.length} مستند • المحادثة محفوظة تلقائياً</div>
    </div>`;

  const inp = document.getElementById('chat-inp');
  if(inp) inp.addEventListener('keydown', e => {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); }
  });
  setTimeout(() => { const e=document.getElementById('cend'); if(e) e.scrollIntoView(); }, 40);
}

/* ── Manage View ── */
function rManage(el){
  const q = SEARCH.toLowerCase();
  const filtered = KB.filter(k =>
    k.title.toLowerCase().includes(q) || k.content.toLowerCase().includes(q)
  );

  el.innerHTML = `
    <div class="mh">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="mh-title" style="direction:rtl;">📚 قاعدة المعرفة (${KB.length})</div>
      <input id="search-inp" value="${esc(SEARCH)}" placeholder="بحث..."
        style="padding:6px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;outline:none;direction:rtl;width:180px;"
        oninput="SEARCH=this.value; rManage(document.getElementById('main'))" />
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px;">
      ${!filtered.length ? `
        <div style="text-align:center;padding:50px;color:#9CA3AF;direction:rtl;">
          <div style="font-size:40px;margin-bottom:10px;">📭</div>
          <div style="font-size:14px;">${KB.length===0 ? 'لا يوجد محتوى. أضف أول مستند!' : 'لا نتائج للبحث'}</div>
          ${KB.length===0 ? `<button class="pri-btn" onclick="gv('add',true)" style="margin-top:14px;">+ إضافة أول مستند</button>` : ''}
        </div>` :
        `<div class="kb-grid">${filtered.map(item => {
          const c = gc(item.category);
          const conf = DELID===item.id;
          return `<div class="kcard">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
              <span class="cbadge" style="background:${c.bg};color:${c.col};">${c.ar}</span>
              ${conf ?
                `<div style="display:flex;gap:4px;align-items:center;">
                  <span style="font-size:11px;color:#B91C1C;">تأكيد الحذف؟</span>
                  <button onclick="doDelete('${item.id}')" style="padding:2px 7px;font-size:11px;background:#DC2626;border:none;border-radius:4px;color:#fff;font-weight:600;">نعم</button>
                  <button onclick="DELID=null;re()" style="padding:2px 7px;font-size:11px;background:#F3F4F6;border:none;border-radius:4px;">لا</button>
                </div>` :
                `<div style="display:flex;gap:4px;">
                  <button class="edit-btn" onclick="openEdit('${item.id}')">✏️ تعديل</button>
                  <button class="del-btn" onclick="DELID='${item.id}';re()">🗑️</button>
                </div>`
              }
            </div>
            <div style="font-weight:600;font-size:13px;margin-bottom:5px;">${esc(item.title)}</div>
            <div style="font-size:12px;color:#6B7280;line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${esc(item.content)}</div>
            <div style="font-size:10px;color:#D1D5DB;margin-top:8px;">${new Date(item.updated_at||item.updatedAt||item.created_at||item.createdAt).toLocaleDateString('ar-EG')} • ${item.content.length.toLocaleString()} حرف</div>
          </div>`;
        }).join('')}</div>`
      }
    </div>`;
}

/* ── Add / Edit View ── */
function rAdd(el){
  el.innerHTML = `
    <div class="mh">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="mh-title" style="direction:rtl;">${EDIT ? '✏️ تعديل المستند' : '➕ إضافة محتوى جديد'}</div>
      <button class="ibtn" onclick="gv('manage')">← رجوع</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px;">
      <div style="max-width:680px;margin:0 auto;direction:rtl;">

        <div class="hint-box" style="margin-bottom:16px;">
          💡 الصق نص السياسة أو الإجراء أو النموذج في خانة المحتوى. يمكنك نسخ النص من PDF أو Word أو أي مصدر.
        </div>

        <div style="margin-bottom:14px;">
          <label class="form-label">عنوان المستند *</label>
          <input class="form-inp" id="f-title" value="${esc(FORM.title)}"
            oninput="FORM.title=this.value"
            placeholder="مثال: إجراءات التنازل عن الوحدة" />
        </div>

        <div style="margin-bottom:14px;">
          <label class="form-label">التصنيف</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${CATS.map(c => `
              <button onclick="FORM.category='${c.id}';rAdd(document.getElementById('main'))"
                style="padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;
                border:${FORM.category===c.id ? `2px solid ${c.col}` : '2px solid #E5E7EB'};
                background:${FORM.category===c.id ? c.bg : '#fff'};
                color:${FORM.category===c.id ? c.col : '#9CA3AF'};">${c.ar}</button>`).join('')}
          </div>
        </div>

        <div style="margin-bottom:14px;">
          <label class="form-label">المحتوى * <span style="font-weight:400;color:#9CA3AF;">(الصق النص هنا)</span></label>
          <textarea id="f-content" rows="14"
            oninput="FORM.content=this.value;document.getElementById('cc').textContent=this.value.length.toLocaleString()+' حرف'"
            placeholder="الصق هنا نص السياسة أو الإجراء أو النموذج..."
            style="width:100%;padding:11px 13px;border:1px solid #E5E7EB;border-radius:7px;font-size:13px;resize:vertical;outline:none;line-height:1.75;direction:rtl;">${esc(FORM.content)}</textarea>
          <div id="cc" style="font-size:10px;color:#9CA3AF;margin-top:3px;text-align:left;">${FORM.content.length.toLocaleString()} حرف</div>
        </div>

        <div id="ferr" style="display:none" class="err-box" style="margin-bottom:12px;"></div>
        <div id="fok"  style="display:none" class="ok-box"  style="margin-bottom:12px;"></div>

        <div style="display:flex;gap:8px;">
          <button class="pri-btn" onclick="saveItem()">${EDIT ? '💾 حفظ التعديلات' : '➕ إضافة إلى قاعدة المعرفة'}</button>
          <button class="sec-btn" onclick="gv('manage')">إلغاء</button>
        </div>
      </div>
    </div>`;
}

/* ══ ACTIONS ══ */
function gv(v, reset){
  VIEW=v; DELID=null;
  if(reset){ EDIT=null; FORM={title:'',category:'general',content:''}; }
  closeSidebar();
  re();
}

function openEdit(id){
  const item = KB.find(k=>k.id===id); if(!item) return;
  EDIT=item; FORM={title:item.title, category:item.category, content:item.content};
  VIEW='add'; DELID=null; re();
}

async function doDelete(id){
  KB = KB.filter(k=>k.id!==id);
  DELID=null;
  localStorage.setItem('nos-kb', JSON.stringify(KB));
  re();
  await sbDelete(id);
}

async function saveItem(){
  const ft = document.getElementById('f-title');
  const fc = document.getElementById('f-content');
  if(ft) FORM.title   = ft.value;
  if(fc) FORM.content = fc.value;

  const fe = document.getElementById('ferr');
  const fo = document.getElementById('fok');

  if(!FORM.title.trim()){
    if(fe){ fe.style.display='block'; fe.textContent='⚠️ العنوان مطلوب'; } return;
  }
  if(!FORM.content.trim()){
    if(fe){ fe.style.display='block'; fe.textContent='⚠️ المحتوى مطلوب'; } return;
  }
  if(fe) fe.style.display='none';

  const now = new Date().toISOString();
  const item = EDIT
    ? {...EDIT, ...FORM, updated_at: now}
    : {id:'k'+Date.now(), ...FORM, created_at: now, updated_at: now};

  /* تحديث محلي فوري */
  KB = EDIT ? KB.map(k => k.id===item.id ? item : k) : [...KB, item];
  EDIT=null;
  localStorage.setItem('nos-kb', JSON.stringify(KB));
  if(fo){ fo.style.display='block'; fo.textContent='⏳ جاري الحفظ...'; }

  /* رفع لـ Supabase */
  try {
    await sbUpsert(item);
    if(fo){ fo.textContent='✅ تم الحفظ بنجاح!'; }
  } catch(e){
    if(fo){ fo.textContent='⚠️ تم الحفظ محلياً — تحقق من الاتصال'; }
  }
  setTimeout(() => { VIEW='manage'; re(); }, 900);
}

async function doSend(){
  const inp = document.getElementById('chat-inp');
  const txt = inp ? inp.value.trim() : '';
  if(!txt || BUSY) return;

  MSGS.push({role:'user', content:txt});
  if(inp) inp.value='';
  BUSY=true; saveMsgs(); re();

  /* ── تنظيف HTML من المحتوى ── */
  function clean(text){
    return text.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
  }

  /* ── Smart KB Filter: بس أكتر 3 مستندات ذات صلة ── */
  function relevantDocs(q, limit=3){
    if(!KB.length) return [];
    const words = q.toLowerCase().split(/[\s،,،؟?]+/).filter(w=>w.length>1);
    const scored = KB.map(k => {
      const text = (k.title+' '+clean(k.content)).toLowerCase();
      const score = words.reduce((s,w) => s + (text.includes(w) ? 1 : 0), 0);
      return {k, score};
    });
    scored.sort((a,b) => b.score-a.score);
    const top = scored.slice(0, limit).map(x=>x.k);
    return top.length && scored[0].score>0 ? top : KB.slice(0,2);
  }
  /* قصّر كل مستند على 600 حرف */
  function trim(text, max=600){ const t=clean(text); return t.length>max ? t.slice(0,max)+'…' : t; }

  const docs = relevantDocs(txt);
  const base = 'أنت مساعد ذكي لشركة Nations of Sky (NOS). أجب بناءً على قاعدة المعرفة التالية فقط. إذا لم تجد المعلومة، قل ذلك صراحةً. استخدم العربية أساساً. كن مختصراً ومفيداً.';
  const ctx  = KB.length
    ? base + '\n\n# قاعدة المعرفة (أكثر صلة بسؤالك):\n\n'
      + docs.map((k,i)=>`### [${i+1}] ${k.title} (${gc(k.category).ar})\n${trim(k.content)}`).join('\n\n---\n\n')
    : base + '\n\nقاعدة المعرفة فارغة حالياً.';

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: MSGS.map(m=>({role:m.role, content:m.content})),
        system: ctx
      })
    });
    const d = await res.json();
    if(d.error) throw new Error(d.error);
    MSGS.push({role:'assistant', content: d.text || 'لم أتمكن من الإجابة.'});
  } catch(err) {
    const msg = err.message||'';
    const wait = msg.match(/try again in ([\d.]+)s/);
    MSGS.push({role:'assistant', content:
      wait ? `⏳ الطلبات كتير — استنى ${Math.ceil(wait[1])} ثانية وحاول تاني.`
           : '❌ خطأ في الاتصال:\n' + msg
    });
  }
  BUSY=false; saveMsgs(); re();
}

function clearChat(){
  if(!confirm('مسح كل المحادثة؟')) return;
  MSGS=[]; saveMsgs(); re();
}

init();

/* ── Quick Questions ── */
function sendQuick(q){
  const inp = document.getElementById('chat-inp');
  if(inp) inp.value = q;
  doSend();
}

/* ── Sidebar Toggle (Mobile) ── */
function toggleSidebar(){
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('on');
}
function closeSidebar(){
  document.getElementById('sb').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

/* ── PWA Service Worker ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
