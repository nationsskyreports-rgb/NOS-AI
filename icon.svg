  <line x1="256" y1="130" x2="256" y2="90" stroke="#C8A86B" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="78" r="14" fill="#C8A86B"/>
  <!-- Ears -->
  <rect x="126" y="175" width="30" height="50" rx="10" fill="#1A2D40" stroke="#C8A86B" stroke-width="5"/>
  <rect x="356" y="175" width="30" height="50" rx="10" fill="#1A2D40" stroke="#C8A86B" stroke-width="5"/>
  <!-- Body -->
