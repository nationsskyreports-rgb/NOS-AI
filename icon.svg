<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0D1B2A"/>
  <!-- Gold accent bar -->
  <rect x="60" y="380" width="392" height="8" rx="4" fill="#C8A86B" opacity="0.4"/>
  <!-- Robot head -->
  <rect x="156" y="130" width="200" height="170" rx="30" fill="#1A2D40" stroke="#C8A86B" stroke-width="6"/>
  <!-- Eyes -->
  <circle cx="210" cy="205" r="22" fill="#C8A86B"/>
  <circle cx="302" cy="205" r="22" fill="#C8A86B"/>
  <circle cx="210" cy="205" r="10" fill="#0D1B2A"/>
  <circle cx="302" cy="205" r="10" fill="#0D1B2A"/>
  <!-- Mouth -->
  <rect x="196" y="255" width="120" height="12" rx="6" fill="#C8A86B" opacity="0.7"/>
